apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: cloudnova-eks
  region: us-east-1
  version: "1.30"

managedNodeGroups:
  - name: cloudnova-workers
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 3
    volumeSize: 25
    privateNetworking: false
    ssh:
      allow: false
