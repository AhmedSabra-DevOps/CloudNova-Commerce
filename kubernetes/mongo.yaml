apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-products
  namespace: cloudnova
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-products
  template:
    metadata:
      labels:
        app: db-products
    spec:
      containers:
        - name: mongo
          image: mongo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: db-products
  namespace: cloudnova
spec:
  type: ClusterIP
  selector:
    app: db-products
  ports:
    - port: 27017
      targetPort: 27017
