apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-ui
  namespace: cloudnova
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-ui
  template:
    metadata:
      labels:
        app: store-ui
    spec:
      containers:
        - name: store-ui
          image: ahmedsabra/cloudnova-store-ui:v4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: store-ui
  namespace: cloudnova
spec:
  type: NodePort
  selector:
    app: store-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30090
