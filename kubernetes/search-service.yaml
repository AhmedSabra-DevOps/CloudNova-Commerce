apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: cloudnova
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
        - name: search-service
          image: ahmedsabra/cloudnova-search-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: ELASTIC_URL
              value: "http://search-engine:9200"
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: cloudnova
spec:
  type: ClusterIP
  selector:
    app: search-service
  ports:
    - port: 4000
      targetPort: 4000
